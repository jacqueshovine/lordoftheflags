<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Ring -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="#0E2A47" stroke-width="1.5"/>
  <!-- Crosshair tick lines -->
  <line x1="32" y1="3" x2="32" y2="61" stroke="#0E2A47" stroke-width="1"/>
  <line x1="3" y1="32" x2="61" y2="32" stroke="#0E2A47" stroke-width="1"/>
  <!-- Needle (red north arm, parchment south arm, gold center pivot) -->
